name: Docker

on:
  push:
    branches: ['main']
    tags: ['v*.*.*']
env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.filter.outputs.versions }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Detect changed versions
        id: filter
        env:
          BEFORE: ${{ github.event.before }}
        run: |
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ] || ! git rev-parse "$BEFORE" >/dev/null 2>&1; then
            echo "New branch or force-push, building all versions"
            CHANGED=$(ls -d *-alpine 2>/dev/null | sed 's|-alpine||' | sort -u)
          else
            CHANGED=$(git diff --name-only "$BEFORE"..HEAD | grep -F -- '-alpine/' | sed 's|-alpine/.*||' | sort -u)
          fi
          JSON=$(echo "$CHANGED" | jq -R -s -c '[split("\n")[] | select(length > 0)]')
          echo "versions=$JSON" >> "$GITHUB_OUTPUT"
          echo "Changed versions: $JSON"

  build:
    needs: changes
    if: ${{ needs.changes.outputs.versions != '[]' && needs.changes.outputs.versions != '' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        version: ${{ fromJson(needs.changes.outputs.versions) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: docker.io/zapote/go-aws

      - name: Build and push go-aws:${{ matrix.version }}-alpine
        uses: docker/build-push-action@v6
        with:
          context: '{{defaultContext}}:${{ matrix.version }}-alpine'
          push: ${{ github.event_name != 'pull_request' }}
          tags: docker.io/zapote/go-aws:${{ matrix.version }}-alpine
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.version }}
          cache-to: type=gha,mode=max,scope=${{ matrix.version }}
